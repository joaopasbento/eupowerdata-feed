name: fetch-transition

on:
  schedule:
    # Weekly, Monday 05:00 UTC. Eurostat GHG/energy-balance data is annual
    # (GHG lags ~2 years), so weekly is more than enough.
    - cron: '0 5 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-transition:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Fetch Eurostat transition data (all countries)
        env:
          PYTHONUNBUFFERED: '1'
        run: python fetch_eurostat.py

      # Augments transition.json with monthly BEV registrations from EAFO.
      # continue-on-error: an EAFO hiccup must never block the Eurostat commit.
      - name: Fetch EAFO monthly BEV registrations
        continue-on-error: true
        env:
          PYTHONUNBUFFERED: '1'
        run: python fetch_eafo.py

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update transition data (multi-country) $(date -u +'%Y-%m-%d %H:%M UTC')"
            git pull --rebase origin main || true
            git push
          fi
