name: Backfill historical archive

# Manual trigger only — this is a one-shot backfill, not a scheduled job.
# Once the archive is populated, the regular fetch_entsoe.py cron continues
# to add one new file per day automatically.
on:
  workflow_dispatch:
    inputs:
      days:
        description: 'Number of days to backfill (1–365). Default 365.'
        required: false
        default: '365'

permissions:
  contents: write   # needed to commit the new archive files

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run backfill
        env:
          ENTSOE_API_KEY: ${{ secrets.ENTSOE_API_KEY }}
          BACKFILL_DAYS: ${{ github.event.inputs.days }}
        run: python backfill_archive.py

      # Safety net: the script now commits & pushes in batches of 20 during
      # the loop. This step only fires if the script died mid-batch and left
      # un-committed files behind. Using pull --rebase before push so we
      # don't conflict with the regular fetch_entsoe.py cron.
      - name: Commit any leftover files
        if: always()
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add data/archive/ || true
          if git diff --cached --quiet; then
            echo 'No leftover files to commit'
            exit 0
          fi
          git commit -m "Backfill leftover ($(date -u +'%Y-%m-%d %H:%M UTC'))"
          for i in 1 2 3 4 5; do
            if git push; then
              echo "pushed on attempt $i"
              exit 0
            fi
            echo "push failed attempt $i, pulling and retrying..."
            git pull --rebase --autostash || true
          done
          echo "push failed after 5 attempts"
          exit 1
