name: fetch-datacenters

on:
  schedule:
    # Daily at 04:00 UTC (datacenter list changes slowly)
    - cron: '0 4 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-datacenters:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        # reverse_geocoder bundles a ~85MB offline dataset of >3M cities
        # used to resolve datacenter coordinates → ISO country codes.
        # Worldwide coverage, no API rate limits, sub-millisecond lookups.
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch datacenters
        env:
          PYTHONUNBUFFERED: '1'
        run: python fetch_datacenters.py

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Pull --rebase before push to handle the case where the user
          # commits to fetch_datacenters.py while this workflow is running.
          # Without this the push gets rejected ("fetch first").
          git pull --rebase origin main || true
          git add data/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update datacenter data $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
